apiVersion: v1
kind: Namespace
metadata:
  name: holos-prj-default-sharing-demo
  labels:
    app.kubernetes.io/managed-by: holos.run
    holos.run/organization: local-dev
    holos.run/project: default-sharing-demo
    holos.run/resource-type: project
    kubernetes.io/metadata.name: holos-prj-default-sharing-demo
  annotations:
    holos.run/description: "Demo project for default secret sharing"
    holos.run/display-name: "Default Sharing Demo"
    holos.run/share-roles: '[]'
    holos.run/share-users: '[{"principal":"admin@localhost","role":"owner"}]'
    holos.run/default-share-users: '[{"principal":"alice@example.com","role":"viewer"}]'
    holos.run/default-share-roles: '[{"principal":"dev-team","role":"editor"}]'
