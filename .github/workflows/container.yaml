name: Container

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: holos-run
  IMAGE_NAME: secrets-manager

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref to build (e.g., refs/tags/v1.2.3, refs/heads/main)'
        required: true
        type: string
      tag:
        description: 'Image tag to publish; defaults to the short SHA of the resolved ref when blank'
        required: false
        default: ''
        type: string

jobs:
  buildx:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Set ref from trigger event
        id: opts
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.git_ref }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${GITHUB_REF}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ steps.opts.outputs.ref }}

      - name: SHA
        id: sha
        run: echo "sha=$(/usr/bin/git log -1 --format='%H')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Fetch tags
        run: git fetch --prune --unshallow --tags

      - name: Set Tags
        id: tags
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          detail="$(/usr/bin/git describe --tags HEAD)"
          suffix="$(test -n "$(git status --porcelain)" && echo '-dirty' || echo '')"
          tag="${detail}${suffix}"

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            case "${IN_TAG}" in
              *[$'\n\r']*)
                echo "::error::tag must not contain newline characters" >&2
                exit 1
                ;;
            esac
            if [ -n "${IN_TAG}" ] \
              && ! printf '%s' "${IN_TAG}" \
                | grep -Eq '^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'; then
              echo "::error::Invalid image tag: '${IN_TAG}'" >&2
              exit 1
            fi
            tag="${IN_TAG:-$(git rev-parse --short HEAD)}"
          fi

          {
            printf 'detail=%s\n' "${detail}"
            printf 'suffix=%s\n' "${suffix}"
            printf 'tag=%s\n' "${tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container images
        id: build-and-push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}${{ steps.tags.outputs.suffix }}

      - name: Setup Cosign to sign container images
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          cosign sign --yes "${REGISTRY}/${REGISTRY_OWNER}/${IMAGE_NAME}:${{ steps.tags.outputs.tag }}@${DIGEST}"
          cosign sign --yes "${REGISTRY}/${REGISTRY_OWNER}/${IMAGE_NAME}:${{ steps.sha.outputs.sha }}${{ steps.tags.outputs.suffix }}@${DIGEST}"

    outputs:
      tag: ${{ steps.tags.outputs.tag }}
      detail: ${{ steps.tags.outputs.detail }}
